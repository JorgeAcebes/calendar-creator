name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: pnpm install

      - name: generate prisma client
        run: pnpm --filter @calendar-creator/api exec prisma generate

      - name: build workspace
        run: pnpm run build

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "apps/web"
          tagName: ${{ github.ref_name }}
          releaseName: "Calendar Creator ${{ github.ref_name }}"
          releaseBody: "Descarga el instalador de la aplicación a continuación (.exe)."
          releaseDraft: false
          prerelease: false
