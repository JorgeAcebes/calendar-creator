version: "3.9"

services:
  # ── Backend API ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - UPLOAD_DIR=/app/uploads
      - ICC_PROFILE_PATH=/app/icc-profiles/ISOcoated_v2_eci.icc
      - JWT_SECRET=calendar-creator-dev-secret-change-in-prod
      - DATABASE_URL=file:/app/data/calendar.db
    volumes:
      - ./apps/api/src:/app/src
      - api_uploads:/app/uploads
      - api_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis (for BullMQ job queue) ─────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  api_uploads:
  api_data:
  redis_data:
